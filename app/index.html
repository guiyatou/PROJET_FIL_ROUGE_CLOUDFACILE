<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Projet DevOps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .badge {
            background: #00c853;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 16px;
            background: linear-gradient(90deg, #00c853, #00b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 40px;
        }

        .stack {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .card {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px 24px;
            min-width: 140px;
        }

        .card .icon { font-size: 32px; margin-bottom: 8px; }
        .card .name { font-size: 14px; color: #aaa; }

        .footer {
            color: #555;
            font-size: 13px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #00c853;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">🚀 Déployé via GitHub Actions</div>
        <h1>Mon Projet DevOps</h1>
        <p>Infrastructure Cloud automatisée, sécurisée et surveillée sur AWS</p>

        <div class="stack">
            <div class="card">
                <div class="icon">🏗️</div>
                <div class="name">Terraform</div>
            </div>
            <div class="card">
                <div class="icon">☁️</div>
                <div class="name">AWS EC2</div>
            </div>
            <div class="card">
                <div class="icon">🐳</div>
                <div class="name">Docker</div>
            </div>
            <div class="card">
                <div class="icon">⚙️</div>
                <div class="name">GitHub Actions</div>
            </div>
            <div class="card">
                <div class="icon">📊</div>
                <div class="name">Grafana</div>
            </div>
        </div>

        <div class="footer">
            <span class="dot"></span> Serveur actif — AWS eu-west-1 (Irlande)
        </div>
    </div>
</body>
</html>
